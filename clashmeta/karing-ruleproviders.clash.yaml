# --- 策略组配置 ---
proxy-groups:
  - name: $app_name
    type: select
    proxies:
      - 自动选择
      - 故障转移

  - name: 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies: []

  - name: 故障转移
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies: []


rules:
  # === 本地网络直连 ===
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN-SUFFIX,localhost,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve

  # === 广告拦截 ===
  - RULE-SET,reject,REJECT
  - RULE-SET,adcompany,REJECT

  # === Apple ===
  - RULE-SET,apple,$app_name

  # === Google ===
  - RULE-SET,google,$app_name
  - RULE-SET,googleplay,$app_name
  - RULE-SET,googlefcm,$app_name
  - RULE-SET,googlegemini,$app_name

  # === 流媒体 & 社交 ===
  - RULE-SET,proxy-media,$app_name
  - RULE-SET,tiktok,$app_name
  - RULE-SET,instagram,$app_name
  - RULE-SET,netflix,$app_name

  # === AI & Dev ===
  - RULE-SET,openai,$app_name
  - RULE-SET,github,$app_name
  - RULE-SET,claude,$app_name

  # === Microsoft ===
  - RULE-SET,bing,$app_name
  - RULE-SET,onedrive,$app_name
  - RULE-SET,microsoft,$app_name

  # === Gaming ===
  - RULE-SET,gaming,$app_name

  # === 中国直连 ===
  - RULE-SET,china-media,DIRECT
  - RULE-SET,neteasemusic,DIRECT
  - RULE-SET,china-domain,DIRECT
  - DOMAIN-SUFFIX,cn,DIRECT
  - GEOIP,CN,DIRECT

  # === 代理 ===
  - RULE-SET,gfwlist,$app_name

  # === Telegram ===
  - RULE-SET,telegram,$app_name
  - RULE-SET,telegramcidr,$app_name,no-resolve

  # === 兜底 ===
  - MATCH,$app_name

