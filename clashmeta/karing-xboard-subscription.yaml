# --- 2. 策略组配置 ---
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - 🔯 故障转移

  - name: 🔯 故障转移
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 180
    proxies: []

  # --- 应用分组 ---
  - name: 💬 Ai平台
    type: select
    proxies:
      - 🚀 节点选择
      - 🎯 全球直连

