mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
external-controller: 127.0.0.1:9090
clash-for-android:
  append-system-dns: false
unified-delay: true
global-client-fingerprint: chrome
keep-alive-interval: 360
proxies: ~

