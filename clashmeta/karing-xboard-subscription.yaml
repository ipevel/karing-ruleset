# --- 3. 规则分流逻辑（内联关键词优先匹配，RULE-SET兜底）---
rules:
  # === 本地网络直连 ===
  - DOMAIN-SUFFIX,local,🎯 全球直连
  - IP-CIDR,127.0.0.0/8,🎯 全球直连,no-resolve
  - IP-CIDR,192.168.0.0/16,🎯 全球直连,no-resolve
  - IP-CIDR,10.0.0.0/8,🎯 全球直连,no-resolve
  - IP-CIDR,172.16.0.0/12,🎯 全球直连,no-resolve

  # === 广告拦截 ===
  - RULE-SET,reject,🛑 全球拦截
  - RULE-SET,adcompany,🛑 全球拦截

  # === AI平台（内联关键词先匹配，RULE-SET兜底）===
  - DOMAIN-KEYWORD,openai,💬 Ai平台
  - DOMAIN-KEYWORD,chatgpt,💬 Ai平台
  - DOMAIN-KEYWORD,claude,💬 Ai平台
  - DOMAIN-KEYWORD,anthropic,💬 Ai平台
  - DOMAIN-KEYWORD,gemini,💬 Ai平台
  - DOMAIN-SUFFIX,chatgpt.com,💬 Ai平台
  - DOMAIN-SUFFIX,claude.ai,💬 Ai平台
  - DOMAIN-SUFFIX,openai.com,💬 Ai平台
  - DOMAIN-SUFFIX,anthropic.com,💬 Ai平台
  - DOMAIN-SUFFIX,copilot.microsoft.com,💬 Ai平台
  - RULE-SET,openai,💬 Ai平台
  - RULE-SET,claude,💬 Ai平台
  - RULE-SET,googlegemini,💬 Ai平台

  # === 流媒体（内联关键词先匹配，RULE-SET兜底）===
  - DOMAIN-KEYWORD,youtube,📹 油管视频
  - DOMAIN-KEYWORD,googlevideo,📹 油管视频
  - DOMAIN-SUFFIX,youtube.com,📹 油管视频
  - DOMAIN-SUFFIX,youtu.be,📹 油管视频
  - DOMAIN-KEYWORD,netflix,🎥 奈飞视频
  - DOMAIN-SUFFIX,nflxvideo.net,🎥 奈飞视频
  - DOMAIN-KEYWORD,tiktok,🏷️ TikTok
  - DOMAIN-SUFFIX,tiktok.com,🏷️ TikTok
  - DOMAIN-KEYWORD,instagram,📸 Instagram
  - DOMAIN-SUFFIX,instagram.com,📸 Instagram
  - RULE-SET,proxy-media,📹 油管视频
  - RULE-SET,netflix,🎥 奈飞视频
  - RULE-SET,tiktok,🏷️ TikTok
  - RULE-SET,instagram,📸 Instagram

  # === Telegram（内联关键词先匹配，RULE-SET兜底）===
  - DOMAIN-KEYWORD,telegram,📲 电报消息
  - DOMAIN-SUFFIX,t.me,📲 电报消息
  - DOMAIN-SUFFIX,telegram.org,📲 电报消息
  - RULE-SET,telegram,📲 电报消息
  - RULE-SET,telegramcidr,📲 电报消息,no-resolve

  # === Google（已剥离YouTube/Play/FCM/Gemini，RULE-SET兜底）===
  - RULE-SET,google,🔍 Google
  - RULE-SET,googleplay,▶️ Google Play
  - RULE-SET,googlefcm,🔔 Google FCM

  # === Apple ===
  - RULE-SET,apple,🍎 苹果服务

  # === GitHub（内联关键词先匹配，RULE-SET兜底）===
  - DOMAIN-KEYWORD,github,🧑‍💻 GitHub
  - DOMAIN-SUFFIX,github.com,🧑‍💻 GitHub
  - RULE-SET,github,🧑‍💻 GitHub

  # === Microsoft ===
  - RULE-SET,bing,🔎 微软 Bing
  - RULE-SET,onedrive,☁️ 微软云盘
  - RULE-SET,microsoft,🖥️ 微软服务

  # === Gaming ===
  - RULE-SET,gaming,🎮 游戏平台

  # === 中国直连 ===
  - RULE-SET,bilibili,📺 哔哩哔哩
  - RULE-SET,neteasemusic,🎵 网易音乐
  - RULE-SET,chinadomain,🎯 全球直连
  - DOMAIN-SUFFIX,cn,🎯 全球直连
  - GEOIP,CN,🎯 全球直连

  # === GFWlist 兜底 ===
  - RULE-SET,gfwlist,🚀 节点选择

  # === 最终兜底 ===
  - MATCH,🐟 漏网之鱼
