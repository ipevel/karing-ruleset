#!MANAGED-CONFIG https://raw.githubusercontent.com/ipevel/karing-ruleset/main/karing-surfboard.conf interval=43200 strict=true

[General]
loglevel = notify
ipv6 = false
skip-proxy = localhost, *.local, injections.adguard.org, local.adguard.org, 0.0.0.0/8, 10.0.0.0/8, 17.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.168.0.0/16, 192.88.99.0/24, 198.18.0.0/15, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 240.0.0.0/4, 255.255.255.255/32
tls-provider = default
show-error-page-for-reject = true
dns-server = 223.6.6.6, 119.29.29.29, 119.28.28.28
test-timeout = 5
internet-test-url = http://bing.com
proxy-test-url = http://bing.com

[Panel]
SubscribeInfo = $subscribe_info, style=info

[Proxy]

[Proxy Group]
🚀 节点选择 = select, auto, fallback
auto = url-test, include-all-proxies = true, url=http://www.gstatic.com/generate_204, interval=43200
fallback = fallback, include-all-proxies = true, url=http://www.gstatic.com/generate_204, interval=43200
🔯 故障转移 = fallback, include-all-proxies = true, url=http://www.gstatic.com/generate_204, interval=180
🎯 全球直连 = select, DIRECT, 🚀 节点选择
🛑 全球拦截 = select, REJECT, DIRECT
🐟 漏网之鱼 = select, 🚀 节点选择, 🎯 全球直连, 🔯 故障转移
📲 电报消息 = select, 🚀 节点选择, 🎯 全球直连
📹 油管视频 = select, 🚀 节点选择, 🎯 全球直连
🎥 奈飞视频 = select, 🚀 节点选择, 🎯 全球直连
🌏 国际媒体 = select, 🚀 节点选择, 🎯 全球直连
💬 Ai平台 = select, 🚀 节点选择, 🎯 全球直连
📱 社交媒体 = select, 🚀 节点选择, 🎯 全球直连
🛍️ 购物平台 = select, 🚀 节点选择, 🎯 全球直连
📰 新闻 = select, 🚀 节点选择, 🎯 全球直连
🎮 游戏 = select, 🚀 节点选择, 🎯 全球直连

[Rule]
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/BanAD.ini,🛑 全球拦截
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Google.xml,🎯 全球直连
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Direct.xml,🎯 全球直连
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.xml,🎥 奈飞视频
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.xml,📹 油管视频
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Telegram.xml,📲 电报消息
GEOIP,CN,🎯 全球直连
FINAL,🚀 节点选择

[URL Rewrite]
^https?://(www\.)?gstatic\.com generate_204 header
^https?://(www\.)?google\.com generate_204 header
^https?://captcha\.apple\.com http://127.0.0.1 reject
