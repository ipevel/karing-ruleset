mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
external-controller: 127.0.0.1:9090
clash-for-android:
  append-system-dns: false
unified-delay: true
global-client-fingerprint: chrome
keep-alive-interval: 360
proxies: ~

# --- 1. 远程规则集定义 (Rule Providers) ---
rule-providers:
  # === 广告拦截 ===
  reject:
    type: http
    behavior: domain
    url: "https://fastly.jsdelivr.net/gh/ipevel/karing-ruleset@main/providers/BanAD.txt"
    path: ./ruleset/reject.yaml
    interval: 86400

  adcompany:
    type: http
    behavior: domain
    url: "https://fastly.jsdelivr.net/gh/ipevel/karing-ruleset@main/providers/BanADCompany.txt"
