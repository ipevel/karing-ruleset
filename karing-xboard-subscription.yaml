# --- 2. 策略组配置 ---
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🔯 故障转移

  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies: []

  - name: 🔯 故障转移
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 180
    proxies: []

  - name: 📲 电报消息
    type: select
    proxies:
      - 🚀 节点选择

  - name: 📹 油管视频
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择

  - name: 🎥 奈飞视频
    type: select
    proxies:
      - 🚀 节点选择

  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - ♻️ 自动选择

  - name: 🛑 全球拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 💬 Ai平台
    type: select
    proxies:
      - 🚀 节点选择

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - 🎯 全球直连
      - ♻️ 自动选择
      - 🔯 故障转移


# --- 3. 规则 (Rules) ---
rules:
  # === 本地网络直连 ===
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN-SUFFIX,localhost,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve

  # === 广告拦截 ===
  - RULE-SET,reject,🛑 全球拦截
  - RULE-SET,adcompany,🛑 全球拦截

  # === Apple ===
  - RULE-SET,apple,🚀 节点选择

  # === Google ===
  - RULE-SET,google,💬 Ai平台
  - RULE-SET,googleplay,💬 Ai平台
  - RULE-SET,googlefcm,🚀 节点选择
  - RULE-SET,googlegemini,💬 Ai平台

  # === 流媒体 & 社交 ===
  - RULE-SET,proxy-media,📹 油管视频
  - RULE-SET,tiktok,📹 油管视频
  - RULE-SET,instagram,📹 油管视频
  - RULE-SET,netflix,🎥 奈飞视频

  # === AI & Dev ===
  - RULE-SET,openai,💬 Ai平台
  - RULE-SET,github,🐟 漏网之鱼
  - RULE-SET,claude,💬 Ai平台

  # === Microsoft ===
  - RULE-SET,bing,🚀 节点选择
  - RULE-SET,onedrive,🚀 节点选择
  - RULE-SET,microsoft,🚀 节点选择

  # === Gaming ===
  - RULE-SET,gaming,🚀 节点选择

  # === 中国直连 ===
  - RULE-SET,china-media,🎯 全球直连
  - RULE-SET,neteasemusic,🎯 全球直连
  - RULE-SET,china-domain,🎯 全球直连
  - DOMAIN-SUFFIX,cn,🎯 全球直连
  - GEOIP,CN,🎯 全球直连

  # === Telegram ===
  - RULE-SET,telegram,📲 电报消息
  - RULE-SET,telegramcidr,📲 电报消息,no-resolve

  # === 代理规则 ===
  - RULE-SET,gfwlist,🚀 节点选择

  # === 兜底 ===
  - MATCH,🐟 漏网之鱼
