#!MANAGED-CONFIG https://raw.githubusercontent.com/ipevel/karing-ruleset/main/karing-surfboard.conf interval=43200 strict=true

[General]
loglevel = notify
ipv6 = false
skip-proxy = localhost, *.local, 0.0.0.0/8, 10.0.0.0/8, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.168.0.0/16, 224.0.0.0/4, 240.0.0.0/4
tls-provider = default
show-error-page-for-reject = true
dns-server = system
internet-test-url = http://www.gstatic.com/generate_204
proxy-test-url = http://www.gstatic.com/generate_204
test-timeout = 5

[Proxy]

[Proxy Group]
🚀 节点选择 = url-test, include-all-proxies = true, url=http://www.gstatic.com/generate_204, interval=43200
🔯 故障转移 = fallback, include-all-proxies = true, url=http://www.gstatic.com/generate_204, interval=180
🎯 全球直连 = select, DIRECT, 🚀 节点选择
🛑 全球拦截 = select, REJECT, DIRECT

[Rule]
DOMAIN-SUFFIX,local,🎯 全球直连
IP-CIDR,192.168.0.0/16,🎯 全球直连
IP-CIDR,172.16.0.0/12,🎯 全球直连
IP-CIDR,10.0.0.0/8,🎯 全球直连
GEOIP,CN,🎯 全球直连
FINAL,🚀 节点选择
